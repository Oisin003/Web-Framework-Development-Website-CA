<section class="admin-page">
	<h1>Results Admin</h1>

	<!-- Show success message after a row is updated -->
	<p *ngIf="saveMessage" class="status-message">{{ saveMessage }}</p>
	<!-- Show error message if loading or saving fails -->
	<p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

	<!-- Main table for editing match scores -->
	<table class="admin-table">
		<thead>
			<tr>
				<th>Division</th>
				<th>Home Team</th>
				<th class="score-header">Home Score</th>
				<th class="score-header">Away Score</th>
				<th>Away Team</th>
				<th class="actions-header">Action</th>
			</tr>
		</thead>
		<tbody>
			<!-- Loop through each result row -->
			<tr *ngFor="let result of results">
				<td>{{ result.division }}</td>
				<td>{{ result.hteam }}</td>
				<td>
					<!-- User can edit home team score here -->
					<input
						type="text"
						class="score-input"
						[(ngModel)]="result.hteamscore"
						[name]="'home-score-' + result.id"
						placeholder="0-0-0"
					/>
				</td>
				<td>
					<!-- User can edit away team score here -->
					<input
						type="text"
						class="score-input"
						[(ngModel)]="result.ateamscore"
						[name]="'away-score-' + result.id"
						placeholder="0-0-0"
					/>
				</td>
				<td>{{ result.ateam }}</td>
				<td>
					<!-- Click to save this one row -->
					<button
						type="button"
						class="update-btn"
						(click)="updateResult(result)"
						[disabled]="savingId === result.id"
					>
						{{ savingId === result.id ? 'Saving...' : 'Update' }}
					</button>
				</td>
			</tr>
		</tbody>
	</table>
</section>
