<div class="routes-container">
  <h1>Scoring Stats (per match)</h1>

  <!-- Division filter buttons -->
  <div class="division-filters">
    <label class="form-check">
      <input class="form-check-input" type="radio" name="division" [checked]="selectedDivision === 'all'" (change)="setDivision('all')" />
      All
    </label>
    <label class="form-check">
      <input class="form-check-input" type="radio" name="division" [checked]="selectedDivision === 1" (change)="setDivision(1)" />
      D1
    </label>
    <label class="form-check">
      <input class="form-check-input" type="radio" name="division" [checked]="selectedDivision === 2" (change)="setDivision(2)" />
      D2
    </label>
    <label class="form-check">
      <input class="form-check-input" type="radio" name="division" [checked]="selectedDivision === 3" (change)="setDivision(3)" />
      D3
    </label>
    <label class="form-check">
      <input class="form-check-input" type="radio" name="division" [checked]="selectedDivision === 4" (change)="setDivision(4)" />
      D4
    </label>
  </div>

  <!-- Team scoring averages per match -->
  <div class="table-responsive">
    <table class="tbl">
    <thead>
      <tr>
        <th (click)="setSort('team')" role="button">Team</th>
        <th (click)="setSort('matches')" role="button">Matches</th>
        <th (click)="setSort('total')" role="button">Total</th>
        <th (click)="setSort('goals')" role="button">Goals</th>
        <th (click)="setSort('twoPts')" role="button">2Pts</th>
        <th (click)="setSort('onePts')" role="button">1Pts</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data rows -->
      <tr *ngFor="let stat of visibleRows">
        <td class="team-name-cell">
          <span class="team-dot" [style.background-color]="getTeamColor(stat.team)"></span>
          <span>{{ stat.team }}</span>
        </td>
        <td>{{ stat.matches }}</td>
        <td>{{ stat.total }}</td>
        <td>{{ stat.goals }}</td>
        <td>{{ stat.twoPts }}</td>
        <td>{{ stat.onePts }}</td>
      </tr>
    </tbody>
    </table>
  </div>

</div>
